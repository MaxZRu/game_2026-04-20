<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry API Test Storage</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #111827;
      color: #f3f4f6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #1f2937;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 220px;
    }

    input, textarea, button {
      border: 1px solid #374151;
      border-radius: 8px;
      font: inherit;
      padding: 10px;
      background: #111827;
      color: #f9fafb;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      box-sizing: border-box;
      line-height: 1.4;
    }

    button {
      cursor: pointer;
      min-width: 160px;
    }

    button:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    pre {
      background: #0b1220;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 72px;
    }

    .hint {
      opacity: 0.9;
      margin: 8px 0 16px;
    }

    .links {
      margin: 8px 0 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .links a {
      color: #93c5fd;
    }

    .links a:hover {
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Проверка хранения данных (Pantry API)</h1>

    <div class="links">
      <a href="https://documenter.getpostman.com/view/3281832/SzmZeMLC" target="_blank" rel="noopener noreferrer">Документация Pantry API</a>
      <a href="https://getpantry.cloud/" target="_blank" rel="noopener noreferrer">Основной сайт Pantry</a>
    </div>

    <div class="row">
      <label>
        Pantry ID
        <input id="pantryId" value="186176f4-74e6-427b-a59b-7c815493afe2" />
      </label>
      <label>
        Basket Name
        <input id="basketName" value="test" />
      </label>
    </div>

    <p class="hint">JSON в поле ниже отправляется в API целиком при нажатии "Сохранить (POST create/replace)".</p>

    <textarea id="jsonInput">{
  "message": "hello",
  "updatedAt": "2026-04-27T00:00:00Z"
}</textarea>

    <div class="row" style="margin-top: 12px;">
      <button id="loadBtn" type="button">Загрузить (GET)</button>
      <button id="saveBtn" type="button">Сохранить (POST create/replace)</button>
    </div>

    <h3>Статус / Ответ</h3>
    <pre id="output">Готово к работе.</pre>
  </div>

  <script>
    const pantryInput = document.getElementById("pantryId");
    const basketInput = document.getElementById("basketName");
    const jsonInput = document.getElementById("jsonInput");
    const output = document.getElementById("output");
    const loadBtn = document.getElementById("loadBtn");
    const saveBtn = document.getElementById("saveBtn");

    function getApiUrl() {
      const pantryId = pantryInput.value.trim();
      const basketName = basketInput.value.trim();
      return `https://getpantry.cloud/apiv1/pantry/${encodeURIComponent(pantryId)}/basket/${encodeURIComponent(basketName)}`;
    }

    function setOutput(text, isError = false) {
      output.textContent = text;
      output.style.color = isError ? "#fca5a5" : "#93c5fd";
    }

    async function loadData() {
      try {
        setOutput("Загрузка...");
        const response = await fetch(getApiUrl(), { method: "GET" });
        const text = await response.text();

        if (!response.ok) {
          setOutput(`GET ${response.status}\n${text}`, true);
          return;
        }

        let parsed;
        try {
          parsed = JSON.parse(text);
        } catch {
          parsed = text;
        }

        jsonInput.value = typeof parsed === "string" ? parsed : JSON.stringify(parsed, null, 2);
        setOutput(`GET ${response.status}\nУспешно загружено.`);
      } catch (error) {
        setOutput(`Ошибка GET: ${error.message}`, true);
      }
    }

    async function saveData() {
      let payload;
      try {
        payload = JSON.parse(jsonInput.value);
      } catch (error) {
        setOutput(`Некорректный JSON: ${error.message}`, true);
        return;
      }

      try {
        setOutput("Сохранение...");
        const response = await fetch(getApiUrl(), {
          // Pantry uses POST to create a basket or replace existing contents.
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        const text = await response.text();

        if (!response.ok) {
          setOutput(`POST ${response.status}\n${text}`, true);
          return;
        }

        let pretty = text;
        try {
          pretty = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          // Response may not always be JSON
        }
        setOutput(`POST ${response.status}\n${pretty}`);
      } catch (error) {
        setOutput(`Ошибка POST: ${error.message}`, true);
      }
    }

    loadBtn.addEventListener("click", loadData);
    saveBtn.addEventListener("click", saveData);
  </script>
</body>
</html>
