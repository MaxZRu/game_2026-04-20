<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ably WebSocket Chat</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background: #111827;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #1f2937;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 24px;
    }

    .hint {
      margin-top: 0;
      margin-bottom: 18px;
      color: #93c5fd;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: end;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 230px;
    }

    input, button {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      color: #f8fafc;
      background: #0b1220;
    }

    button {
      cursor: pointer;
      min-width: 150px;
    }

    button:hover:not(:disabled) {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin: 4px 0 14px;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0b1220;
      font-size: 14px;
      color: #bfdbfe;
    }

    .chat {
      border: 1px solid #334155;
      border-radius: 10px;
      background: #020617;
      height: 360px;
      overflow-y: auto;
      padding: 12px;
      margin-bottom: 12px;
    }

    .msg {
      margin-bottom: 10px;
      line-height: 1.4;
      word-break: break-word;
    }

    .meta {
      color: #94a3b8;
      font-size: 12px;
    }

    .system {
      color: #fbbf24;
      font-style: italic;
    }

    .presence {
      font-size: 14px;
      margin-bottom: 10px;
      color: #a7f3d0;
    }

    .links a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Чат на Ably (WebSocket)</h1>
    <p class="hint">
      Для демо можно использовать API key, но для production нужен JWT/token auth.
    </p>

    <div class="row">
      <label>
        Ably API Key
        <input id="apiKey" value="faH5pA.VL-gWQ:H0bVgMa03iX2WJItMxHov0L2oP_Q5SWS4k_hYjk23xY" />
      </label>
      <label>
        Client ID
        <input id="clientId" placeholder="user-xxxxxx" />
      </label>
    </div>

    <div class="row">
      <label>
        Channel
        <input id="channelName" value="my-first-channel" />
      </label>
      <button id="connectBtn" type="button">Подключиться</button>
      <button id="disconnectBtn" type="button" disabled>Отключиться</button>
      <button id="historyBtn" type="button" disabled>История</button>
    </div>

    <div id="status" class="status">Статус: не подключено</div>
    <div id="presence" class="presence">Онлайн: -</div>
    <div id="chat" class="chat"></div>

    <div class="row">
      <label style="flex: 1 1 100%;">
        Сообщение
        <input id="messageInput" placeholder="Введите сообщение..." />
      </label>
      <button id="sendBtn" type="button" disabled>Отправить</button>
    </div>

    <p class="links">
      Документация:
      <a href="https://ably.com/" target="_blank" rel="noopener noreferrer">
        Сервис Ably
      </a>
      |
      <a href="https://ably.com/docs/getting-started/javascript" target="_blank" rel="noopener noreferrer">
        Getting started: Pub/Sub in JavaScript
      </a>
    </p>
  </div>

  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <script>
    const apiKeyInput = document.getElementById("apiKey");
    const clientIdInput = document.getElementById("clientId");
    const channelNameInput = document.getElementById("channelName");
    const messageInput = document.getElementById("messageInput");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const historyBtn = document.getElementById("historyBtn");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");
    const presenceEl = document.getElementById("presence");
    const chatEl = document.getElementById("chat");

    let realtimeClient = null;
    let channel = null;
    let onlineIds = new Set();

    function generateRandomClientId() {
      const randomNumber = Math.floor(Math.random() * 1000000);
      return `user-${String(randomNumber).padStart(6, "0")}`;
    }

    function appendMessage(author, text, timestamp, className = "") {
      const msg = document.createElement("div");
      msg.className = `msg ${className}`.trim();

      const header = document.createElement("div");
      header.className = "meta";
      header.textContent = `${author} • ${new Date(timestamp).toLocaleTimeString()}`;

      const body = document.createElement("div");
      body.textContent = text;

      msg.appendChild(header);
      msg.appendChild(body);
      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function appendSystem(text) {
      appendMessage("system", text, Date.now(), "system");
    }

    function setStatus(text, isError) {
      statusEl.textContent = "Статус: " + text;
      statusEl.style.color = isError ? "#fca5a5" : "#bfdbfe";
    }

    function setConnectedUi(isConnected) {
      connectBtn.disabled = isConnected;
      disconnectBtn.disabled = !isConnected;
      sendBtn.disabled = !isConnected;
      historyBtn.disabled = !isConnected;
      apiKeyInput.disabled = isConnected;
      clientIdInput.disabled = isConnected;
      channelNameInput.disabled = isConnected;
    }

    function updatePresence() {
      const users = Array.from(onlineIds.values());
      presenceEl.textContent = users.length
        ? `Онлайн (${users.length}): ${users.join(", ")}`
        : "Онлайн: -";
    }

    async function connect() {
      const key = apiKeyInput.value.trim();
      const clientId = clientIdInput.value.trim();
      const channelName = channelNameInput.value.trim();

      if (!key || !clientId || !channelName) {
        setStatus("заполните API key, clientId и channel", true);
        return;
      }

      try {
        setStatus("подключение...", false);
        realtimeClient = new Ably.Realtime({ key, clientId });

        realtimeClient.connection.on((stateChange) => {
          setStatus(stateChange.current, stateChange.current === "failed");
        });

        await realtimeClient.connection.once("connected");

        channel = realtimeClient.channels.get(channelName);

        await channel.subscribe((message) => {
          const author = message.clientId || "anonymous";
          appendMessage(author, String(message.data), message.timestamp || Date.now());
        });

        await channel.presence.subscribe((member) => {
          if (member.action === "enter" || member.action === "present") {
            onlineIds.add(member.clientId);
          } else if (member.action === "leave" || member.action === "absent") {
            onlineIds.delete(member.clientId);
          }
          updatePresence();
        });

        await channel.presence.enter({ status: "online" });

        const presentMembers = await channel.presence.get();
        onlineIds = new Set(presentMembers.map((m) => m.clientId));
        updatePresence();

        appendSystem(`Подключено к каналу "${channelName}" как "${clientId}"`);
        setConnectedUi(true);
      } catch (error) {
        setStatus(`ошибка подключения: ${error.message}`, true);
        appendSystem("Не удалось подключиться.");
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !channel) {
        return;
      }

      try {
        await channel.publish("chat-message", text);
        messageInput.value = "";
      } catch (error) {
        setStatus(`ошибка отправки: ${error.message}`, true);
      }
    }

    async function loadHistory() {
      if (!channel) {
        return;
      }

      try {
        appendSystem("Загружаю последние сообщения...");
        const page = await channel.history({ limit: 20 });
        const items = [...page.items].reverse();
        for (const item of items) {
          appendMessage(item.clientId || "history", String(item.data), item.timestamp || Date.now());
        }
      } catch (error) {
        setStatus(`ошибка истории: ${error.message}`, true);
      }
    }

    async function disconnect() {
      try {
        if (channel) {
          await channel.presence.leave();
        }
      } catch {
        // Ignore presence leave errors on disconnect.
      }

      if (realtimeClient) {
        realtimeClient.close();
      }

      realtimeClient = null;
      channel = null;
      onlineIds.clear();
      updatePresence();
      setConnectedUi(false);
      setStatus("не подключено", false);
      appendSystem("Отключено.");
    }

    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    historyBtn.addEventListener("click", loadHistory);
    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    clientIdInput.value = generateRandomClientId();
  </script>
</body>
</html>
