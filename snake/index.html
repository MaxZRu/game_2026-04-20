<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        h1 { color: #4ade80; margin-bottom: 20px; }
        canvas {
            border: 3px solid #4ade80;
            background: #0f0f23;
        }
        .score { color: #fff; font-size: 1.5rem; margin: 10px 0; }
        .back { color: #4ade80; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Змейка</h1>
    <div class="score">Счёт: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <a class="back" href="/">Назад</a>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const SIZE = 20;
        let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;
        let score = 0, gameOver = false, interval;

        function randomFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / SIZE)),
                y: Math.floor(Math.random() * (canvas.height / SIZE))
            };
            if (snake.some(s => s.x === food.x && s.y === food.y)) randomFood();
        }

        function update() {
            if (gameOver) return;
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= canvas.width / SIZE ||
                head.y < 0 || head.y >= canvas.height / SIZE ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver = true;
                draw();
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                randomFood();
            } else {
                snake.pop();
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#4ade80';
            snake.forEach((s, i) => {
                ctx.fillRect(s.x * SIZE + 1, s.y * SIZE + 1, SIZE - 2, SIZE - 2);
            });
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(food.x * SIZE + 2, food.y * SIZE + 2, SIZE - 4, SIZE - 4);
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ade80';
                ctx.font = '30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Игра окончена', canvas.width/2, canvas.height/2);
            }
        }

        document.addEventListener('keydown', e => {
            if (gameOver) return;
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            else if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });

        randomFood();
        interval = setInterval(update, 150);
    </script>
</body>
</html>
